<!DOCTYPE html>

<html lang="pt-br">

<head>

<meta charset="utf-8"/>

<title>Arthur Souza Sally</title>
  
<style type="text/css">

body{cursor:default;background:rgb(0,0,0);}

@font-face{font-family:"pixel";src:url('editundo.ttf')format('truetype');}

:not(p){font-family:pixel;color:rgb(255,255,255);font-size:4vh;text-shadow:0px 0px 3px rgb(255,255,255),1px 0px 0px rgb(255,0,0),-1px 0px 0px rgb(0,0,255);}
h1{font-family:pixel;color:rgb(255,255,255);font-size:8vh;text-shadow:0px 0px 7px rgb(255,255,255),2px 0px 0px rgb(255,0,0),-2px 0px 0px rgb(0,0,255);line-height:2vh;}
h2{font-family:pixel;color:rgb(255,255,255);font-size:7vh;text-shadow:0px 0px 6px rgb(255,255,255),1.75px 0px 0px rgb(255,0,0),-1.75px 0px 0px rgb(0,0,255);line-height:2vh;}
h3{font-family:pixel;color:rgb(255,255,255);font-size:6vh;text-shadow:0px 0px 5px rgb(255,255,255),1.5px 0px 0px rgb(255,0,0),-1.5px 0px 0px rgb(0,0,255);line-height:2vh;}
h4{font-family:pixel;color:rgb(255,255,255);font-size:5vh;text-shadow:0px 0px 4px rgb(255,255,255),1.25px 0px 0px rgb(255,0,0),-1.25px 0px 0px rgb(0,0,255);line-height:2vh;}

.op1{background:rgba(0,0,0,0);border:0px none;width:100%;outline:none;background:url("00.gif");}
.op1:hover{background:rgba(0,0,0,0);border:0px none;width:100%;outline:none;background:rgb(200,0,0);box-shadow:0px 0px 5px rgb(200,0,0);}

</style>

<script type="text/javascript">

document.onselectstart=new Function ("return false")
document.oncontextmenu=new Function ("return false")

if (window.sidebar){
document.onmousedown=disableselect
document.onclick=reEnable
}

function vai(event,n,m){
  if(m==''){
    document.getElementById("variante").innerHTML = "";
    document.getElementById("variante").style.top = "-10000px";
    document.getElementById("variante").style.left = "-10000px";
    document.getElementById("variante").style.height = "5px";
    document.getElementById("variante").style.width = "5px";
  }else{
    document.getElementById("variante").style.top = event.clientY+"px";
    document.getElementById("variante").style.left = event.clientX+"px";
    document.getElementById("variante").style.height = "100px";
    var tmp = 1;
    while(tmp<101){
      setInterval(function(){document.getElementById("variante").style.width = tmp+"px";},tmp*10);
      tmp+=1;
    }
    //document.getElementById("variante").innerHTML = m;
  }
}

</script>

</head>

<body>

<!-- corpo -->
<div style="position:absolute;top:0px;left:0px;right:0px;z-index:0;">
  <div style="height:10vh;width:100%;display:flex;justify-content:center;align-items:center;">
    <h3 style="text-decoration:underline;">Arthur Souza Sally's Portfolio</h3>
  </div>
  <div style="width:100%;margin-bottom:80px;" align="center">
    <div style="width:calc(100% - 80px);" align="left">
      <h4>Intro</h4>
      <span style="margin-left:40px;">Olá! Meu nome é Arthur e sou um programador e desenvolvedor de jogos. Criei essa pagina para mostrar projetos e coisas que eu já fiz ou participei.</span><br/><br/>
    </div>
    <div style="width:calc(100% - 80px);" align="left">
      <h4>Minhas Coisas</h4>
      <a href="https://arthursouzasally.itch.io/hannah-hill"><button class="op1"><table width="100%"><tr><td align="left">Hannah Hill</td><td align="right">25/03/2022</td></tr></table></button></a>
      <a href="https://arthursouzasally.itch.io/lond"><button class="op1" onmouseover="vai(event,'Lond')" onmouseleave="vai(event,'')"><table width="100%"><tr><td align="left">Lond</td><td align="right">19/04/2021</td></tr></table></button></a>
    </div>
  </div>
</div>

<!-- sinopse -->
<div id="variante" style="background:rgba(0,0,0,.5);border:1px solid rgb(120,120,120);border-radius:10px;height:5px;width:5px;position:fixed;top:-10000px;left:-10000px;z-index:1;">
</div>

</body>

</html>
