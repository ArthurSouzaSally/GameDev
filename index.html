<script type="text/javascript">

document.onselectstart=new Function ("return false")
document.oncontextmenu=new Function ("return false")

if (window.sidebar){
document.onmousedown=disableselect
document.onclick=reEnable
}

var aux = window.scrollY;
var mov = 0;

function mover(){
  if(mov==0){
    if(window.scrollY>aux){
      window.scrollTo(0,aux+window.innerHeight);
      aux+=window.innerHeight;
    }else if(window.scrollY<aux){
      window.scrollTo(0,aux-window.innerHeight);
      aux-=window.innerHeight;
    }
    setTimeout(function(){mov=0;},200);
  }else{
    window.scrollTo(0,aux);
  }
  mov+=1;
}

</script>

</head>
